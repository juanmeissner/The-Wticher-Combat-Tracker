<body class="flex flex-col"> <div id="appWrapper">

    <section id="combatScreen">

    <div id="toast">🧠 Teste de Concentração!</div>

    <main class="combat-list p-4 space-y-3" id="combatList"></main>

    <footer class="bg-slate-900 border-t border-slate-800 py-4 px-0 shrink-0 relative z-30">
        <div class="max-w-xl mx-auto flex gap-4">
            
            <div class="flex flex-col gap-2 w-24 shrink-0 justify-between py-1">
                <div class="text-center">
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest leading-none">Rodada</p>
                    <p id="roundCounter" class="text-xl font-bold text-slate-200">1</p>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="openModal('player')" class="btn-control hover:bg-blue-900/40 border-blue-900/50" title="Add Jogador">🧙‍♂️</button>
                    <button onclick="openMonsterChoiceModal()" class="btn-control hover:bg-slate-700" title="Add Monstro">👹</button>
                    <button onclick="endCombat()" onmousedown="startEndCombatPress(event)" onmouseup="cancelEndCombatPress(event)" onmouseleave="cancelEndCombatPress(event)" ontouchstart="startEndCombatPress(event)" ontouchend="cancelEndCombatPress(event)" class="btn-control hover:bg-red-600/50 border-red-900/50" title="Terminar Combate (Segure 3s para apagar tudo)">❌</button>
                    <button onclick="nextTurn()" class="btn-control hover:bg-amber-900/40 border-amber-900/50" title="Próximo">⏩</button>
                    <button onclick="openConditionMenu()" class="btn-control hover:bg-slate-700" title="Condições">🌀</button>
                    <button onclick="toggleBrainStatus()" class="btn-control hover:bg-slate-700" title="Concentração (🧠)">🧠</button>
                </div>
            </div>

            <div class="flex-1">
                <div class="flex justify-between items-center mb-2 px-1">
                    <div class="text-lg text-slate-500 font-bold overflow-hidden whitespace-nowrap truncate mr-2">
                        <span id="targetName" class="text-blue-400">Nenhum</span>
                    </div>
                    <div class="text-lg font-mono font-bold text-slate-100 shrink-0" id="numpadDisplay">0</div>
                </div>

                <div class="numpad-grid">
                    <button class="btn-numpad" onclick="addDigit('7')">7</button>
                    <button class="btn-numpad" onclick="addDigit('8')">8</button>
                    <button class="btn-numpad" onclick="addDigit('9')">9</button>
                    <button class="btn-numpad" onclick="addDigit('4')">4</button>
                    <button class="btn-numpad" onclick="addDigit('5')">5</button>
                    <button class="btn-numpad" onclick="addDigit('6')">6</button>
                    <button class="btn-numpad" onclick="addDigit('1')">1</button>
                    <button class="btn-numpad" onclick="addDigit('2')">2</button>
                    <button class="btn-numpad" onclick="addDigit('3')">3</button>
                    <button class="btn-numpad text-red-400" onclick="clearDisplay()">C</button>
                    <button class="btn-numpad" onclick="addDigit('0')">0</button>
                    <button class="btn-numpad text-slate-500" onclick="popDigit()">←</button>
                </div>
            </div>

            <div class="flex flex-col gap-2 w-16 shrink-0 py-1">
                <button onclick="applyHP(true)" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl flex items-center justify-center shadow-lg" title="Curar / Add Sucesso (0 HP)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </button>
                <button onclick="openDamageBodyModal()" class="flex-1 bg-red-600 hover:bg-red-500 text-white rounded-xl flex items-center justify-center shadow-lg text-2xl" title="Dano / Add Falha (0 HP)">
                    ☠️
                </button>
                <button onclick="openSTModal()"
                class="flex-1 bg-cyan-600 hover:bg-cyan-500 text-white rounded-xl flex items-center justify-center shadow-lg text-2xl"
                title="Gerenciar ST">
                🔷
                </button>
                <button onclick="applyInitiative()" onmousedown="startInitPress(event)" onmouseup="cancelInitPress(event)" onmouseleave="cancelInitPress(event)" ontouchstart="startInitPress(event)" ontouchend="cancelInitPress(event)" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white rounded-xl flex items-center justify-center shadow-lg" title="Definir Iniciativa">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M13 10h7l-9 11v-7H4l9-11v7z"/></svg>
                </button>
            </div>
        </div>
    </footer>


</section>

    <script src="js/monsters.js"></script>
    <script src="js/inventory.js"></script>
    <script src="js/swipe.js"></script>
    
    <script src="js/state.js"></script>
    <script>


        let pressTimer;
        let startY = 0; // Para ignorar scrolls na delegação
        let deleteVisibleId = null;
        let editingId = null; 
        let showEliminated = true; // Controle da divisória
        let concentrationTargetId = null;
        // =========================================
        // SISTEMA DE DANO LOCALIZADO
        // =========================================

        let pendingDamageBodyPart = null;
        let pendingDamageBase = 0;
        let initPressTimer;
        let didInitLongPress = false;

        let endCombatPressTimer;
        let didEndCombatLongPress = false;

        
         // INICIALIZAÇÃO E DELEGAÇÃO DE EVENTOS
        window.onload = () => {

            loadInventory();

            renderInventory();
            const savedPlayers = localStorage.getItem('dnd_players');
            if (savedPlayers) {
                combatants = JSON.parse(savedPlayers);
                let pCount = 0;
                let lastP = null;
                combatants.forEach(c => {
                    if (c.type === 'player') {
                        pCount++;
                        lastP = c;
                    }
                    if (!c.conditions) c.conditions = [];
                    if (!c.deathSaves) c.deathSaves = { success: 0, failures: 0 };
                    if (c.stabilized === undefined) c.stabilized = false;
                    // Migrar dados antigos
                    if (c.statusSpiral) {
                        if (!c.conditions.includes('🌀')) c.conditions.push('🌀');
                        delete c.statusSpiral;
                    }
                });
                playerCounter = pCount + 1;
                if (lastP) 
                lastPlayerData = {
                hp: lastP.hpMax,
                st: lastP.stMax,
                ca: lastP.ca,
                atk: lastP.atkInfo
            };
                if (combatants.length > 0) activeTurnId = combatants[0].id;
                renderList();
            }

            // Delegação de Eventos na Main List
            const list = document.getElementById('combatList');
            list.addEventListener('mousedown', handleCardPressStart);
            list.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
                handleCardPressStart(e);
            }, {passive: true});
            list.addEventListener('touchmove', (e) => {
                if (Math.abs(e.touches[0].clientY - startY) > 10) handleCardPressEnd();
            }, {passive: true});
            list.addEventListener('mouseup', handleCardPressEnd);
            list.addEventListener('mouseleave', handleCardPressEnd);
            list.addEventListener('touchend', handleCardPressEnd);
            list.addEventListener('click', handleListClick);
        };

        // Lógica de Eventos Delegados
        function handleCardPressStart(e) {
            const card = e.target.closest('.combat-card');
            if (!card || deleteVisibleId || e.target.closest('.delete-overlay')) return;
            const id = parseInt(card.id.split('-')[1]);
            pressTimer = setTimeout(() => {
                deleteVisibleId = id;
                renderList();
            }, 1000); 
        }

        function handleCardPressEnd() {
            clearTimeout(pressTimer);
        }

        function handleListClick(e) {
            if (e.target.closest('.eliminated-divider')) {
                showEliminated = !showEliminated;
                renderList();
                return;
            }

            if (e.target.closest('.delete-overlay')) return;

            const card = e.target.closest('.combat-card');
            if (card && !deleteVisibleId) {
                const id = parseInt(card.id.split('-')[1]);
                const c = combatants.find(comp => comp.id === id);
                if (c) selectCombatant(c.id, c.name);
            }
        }

        function getHPColor(pct) {
            if (pct > 50) return '#10b981'; // emerald
            if (pct > 25) return '#f59e0b'; // amber
            return '#ef4444'; // red
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('toast-show');
            setTimeout(() => toast.classList.remove('toast-show'), 3000);
        }

        function openModal(type) {
            const nameInput = document.getElementById('nameInp');
            const hpInp = document.getElementById('hpInp');
            const stInp = document.getElementById('stInp');
            const caInp = document.getElementById('caInp');
            const atkInp = document.getElementById('atkInp');
            
            editingId = null; 
            modalType = type;
            document.getElementById('modalTitle').innerText = type === 'player' ? 'Novo Jogador' : 'Novo Monstro';
            document.getElementById('initInp').value = "";

            if (type === 'monster') {
                nameInput.value = "Inimigo " + monsterCounter;
                hpInp.value = lastMonsterData.hp;
                stInp.value = lastMonsterData.st;
                caInp.value = lastMonsterData.ca;
                atkInp.value = lastMonsterData.atk;
            } else {
                nameInput.value = "Jogador " + playerCounter;
                hpInp.value = lastPlayerData.hp;
                stInp.value = lastPlayerData.st;
                caInp.value = lastPlayerData.ca;
                atkInp.value = lastPlayerData.atk;
            }
            document.getElementById('entityModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('entityModal').style.display = 'none';
        }

        function saveEntity() {
            const name = document.getElementById('nameInp').value;
            const init = parseInt(document.getElementById('initInp').value) || 0;
            const hp = parseInt(document.getElementById('hpInp').value) || 1;
            const st = parseInt(document.getElementById('stInp').value) || 0;
            const ca = parseInt(document.getElementById('caInp').value) || 10;
            const atk = document.getElementById('atkInp').value || "-";
            const armorHead = parseInt(document.getElementById('armorHeadInp').value) || 0;
            const armorTorso = parseInt(document.getElementById('armorTorsoInp').value) || 0;
            const armorArm = parseInt(document.getElementById('armorArmInp').value) || 0;
            const armorLeg = parseInt(document.getElementById('armorLegInp').value) || 0;

            if (!name) return;

            let newlyAddedId = null;
            let isHighestInit = false;

            if (editingId) {
                const index = combatants.findIndex(c => c.id === editingId);
                if (index !== -1) {
                    combatants[index].name = name;
                    combatants[index].initiative = init;
                    combatants[index].hpMax = hp;
                    if (combatants[index].hpCurrent > hp) combatants[index].hpCurrent = hp;
                    combatants[index].stMax = st;
                    if (combatants[index].stCurrent > st) combatants[index].stCurrent = st;
                    combatants[index].ca = ca;
                    combatants[index].atkInfo = atk;
                    combatants[index].armor = {
                    head: armorHead,
                    torso: armorTorso,
                    arm: armorArm,
                    leg: armorLeg
                };
                    
                    if (combatants[index].type === 'player') savePlayersToStorage();
                }
                editingId = null;
            } 
            else {
                // Verifica se é a maior iniciativa
                if (combatants.length === 0) {
                    isHighestInit = true;
                } else {
                    const maxInit = Math.max(...combatants.map(c => c.initiative));
                    if (init >= maxInit) isHighestInit = true;
                }

                const newEntity = {
                    id: Date.now(),
                    name,
                    initiative: init,
                    hpMax: hp,
                    hpCurrent: hp,
                    stMax: st,
                    stCurrent: st,
                    ca,
                    atkInfo: atk,
                    armor: {
                    head: armorHead,
                    torso: armorTorso,
                    arm: armorArm,
                    leg: armorLeg
                    },
                    type: modalType,
                    statusBrain: false,
                    conditions: [],
                    deathSaves: { success: 0, failures: 0 },
                    stabilized: false
                };

                combatants.push(newEntity);
                savePlayersToStorage();
                newlyAddedId = newEntity.id;

                if (modalType === 'monster') {
                    monsterCounter++;
                    lastMonsterData = { hp, st, ca, atk };
                } else {
                    playerCounter++;
                    lastPlayerData = { hp, st, ca, atk };
                    savePlayersToStorage();
                }
            }

            sortCombatants();

            // Configura para ser a vez dele se for a maior iniciativa
            if (newlyAddedId && isHighestInit) {
                activeTurnId = newlyAddedId;
            }
            savePlayersToStorage();
            closeModal();
            renderList(true);
        }

        function editCombatant(event, id) {
            event.stopPropagation();
            cancelDeleteMode(event);
            
            const c = combatants.find(c => c.id === id);
            if (!c) return;

            editingId = c.id;
            modalType = c.type;
            
            document.getElementById('modalTitle').innerText = 'Editar ' + (c.type === 'player' ? 'Jogador' : 'Monstro');
            document.getElementById('nameInp').value = c.name;
            document.getElementById('initInp').value = c.initiative;
            document.getElementById('hpInp').value = c.hpMax;
            document.getElementById('stInp').value = c.stMax;
            document.getElementById('caInp').value = c.ca;
            document.getElementById('atkInp').value = c.atkInfo;
            document.getElementById('armorHeadInp').value = c.armor?.head || 0;
            document.getElementById('armorTorsoInp').value = c.armor?.torso || 0;
            document.getElementById('armorArmInp').value = c.armor?.arm || 0;
            document.getElementById('armorLegInp').value = c.armor?.leg || 0;
            
            document.getElementById('entityModal').style.display = 'flex';
        }

        function removeCombatant(event, id) {
            event.stopPropagation();
            const index = combatants.findIndex(c => c.id === id);
            if (index === -1) return;
            
            const entity = combatants[index];

            if (id === activeTurnId) {
                let nextIndex = index + 1;
                if (nextIndex >= combatants.length) nextIndex = 0;
                activeTurnId = combatants.length > 1 ? combatants[nextIndex].id : null;
            }

            if (selectedId === id) {
                selectedId = null;
                document.getElementById('targetName').innerText = "Nenhum";
            }
            
            combatants.splice(index, 1);
            savePlayersToStorage();
            
            deleteVisibleId = null;
            renderList();
        }

        function cancelDeleteMode(event) {
            if (event) event.stopPropagation();
            deleteVisibleId = null;
            renderList();
        }

        function toggleBrainStatus() {
            if (!selectedId) { showToast('⚠️ Selecione um alvo!'); return; }
            const index = combatants.findIndex(c => c.id === selectedId);
            if (index !== -1) {
                combatants[index].statusBrain = !combatants[index].statusBrain;
                savePlayersToStorage();
                updateCardTargeted(combatants[index]); // Atualiza DOM sem piscar a tela
            }
        }

        function openConditionMenu() {
            if (!selectedId) { showToast('⚠️ Selecione um alvo!'); return; }
            const container = document.getElementById('circleContainer');
            container.innerHTML = `<button class="absolute top-1/2 left-1/2 -mt-6 -ml-6 w-12 h-12 bg-slate-700 rounded-full flex items-center justify-center text-white font-bold z-10 border border-slate-500 shadow-xl" onclick="closeConditionMenu(event, true)">X</button>`;
            
            const conditions = [
                { icon: '😍', name: 'Enfeitiçado.' },
                { icon: '😱', name: 'Medo.' },
                { icon: '🚫', name: 'Incapacitado.' },
                { icon: '👻', name: 'Invisível.' },
                { icon: '🐍', name: 'Envenado.' },
                { icon: '🧎', name: 'Caído' },
                { icon: '😮', name: 'Exausto.' },
                { icon: '🔥', name: 'Em Chamas' },
                { icon: '💫', name: 'Atordoado.' },
                { icon: '🩸', name: 'Sangrando.' },
                { icon: '🧊', name: 'Congelado.' },
                { icon: '⚖️', name: 'Desequilibrado.' }
];

const innerRadius = 95;
const outerRadius = 190;

conditions.forEach((cond, i) => {

    // Divide em dois anéis
    const isOuter = i >= Math.ceil(conditions.length / 2);

    const ringConditions = isOuter
        ? conditions.slice(Math.ceil(conditions.length / 2))
        : conditions.slice(0, Math.ceil(conditions.length / 2));

    const localIndex = isOuter
        ? i - Math.ceil(conditions.length / 2)
        : i;

    const radius = isOuter ? outerRadius : innerRadius;

    const angle =
        (localIndex * (360 / ringConditions.length) - 90)
        * (Math.PI / 180);

    const x = Math.cos(angle) * radius;
    const y = Math.sin(angle) * radius;

    const el = document.createElement('div');

    el.className =
        "absolute top-1/2 left-1/2 -mt-6 -ml-6 w-12 h-12 flex flex-col items-center justify-center";

    el.style.transform = `translate(${x}px, ${y}px)`;

    const c = combatants.find(comp => comp.id === selectedId);

    const isActive =
    Array.isArray(c.conditions) &&
    c.conditions.includes(cond.icon);

    const bgClass = isActive
        ? 'bg-blue-600 border-blue-400'
        : 'bg-slate-800 border-slate-600';

    el.innerHTML = `
<button
    onclick="toggleCondition('${cond.icon}')"

    onmousedown="startConditionPress('${cond.icon}')"
    onmouseup="cancelConditionPress()"
    onmouseleave="cancelConditionPress()"

    ontouchstart="startConditionPress('${cond.icon}')"
    ontouchend="cancelConditionPress()"
            class="w-12 h-12 rounded-full text-2xl flex items-center justify-center border ${bgClass} shadow-lg active:scale-90 transition-transform">

            ${cond.icon}

        </button>

        <span class="text-[10px] text-slate-200 mt-1 font-bold bg-slate-900/80 px-1 rounded whitespace-nowrap">
            ${cond.name}
        </span>
    `;

    container.appendChild(el);
});

            document.getElementById('circularMenu').style.display = 'flex';
        }

        function closeConditionMenu(e, force = false) {
            if (force || (e && e.target.id === 'circularMenu')) {
                document.getElementById('circularMenu').style.display = 'none';
            }
        }

        function toggleCondition(icon) {
            if (!selectedId) return;
            const index = combatants.findIndex(c => c.id === selectedId);
            if (index !== -1) {
                if (!combatants[index].conditions) combatants[index].conditions = [];
                
                const condIndex = combatants[index].conditions.indexOf(icon);
                if (condIndex !== -1) {
                    combatants[index].conditions.splice(condIndex, 1);
                } else {
                    combatants[index].conditions.push(icon);
                }
                
                savePlayersToStorage();
                updateCardTargeted(combatants[index]);
                document.getElementById('circularMenu').style.display = 'none';

                setTimeout(() => {
                    openConditionMenu();
                }, 0);
            }
        }

        const conditionDescriptions = {

'😍': {
    title: 'Enfeitiçado',
    desc: 'A criatura fica encantada e nÃ£o pode atacar quem a enfeitiÃ§ou.'
},

'😱': {
    title: 'Medo',
    desc: 'Movimento reduzido pela metade, se falhar em teste de Coragem irá ficar paralisado durante o turno inteiro.'
},

'🚫': {
    title: 'Incapacitado',
    desc: 'O alvo ficará desmaiado até passar em um teste de resistência ND 18.'
},

'👻': {
    title: 'Invisível',
    desc: 'Díficil de detectar visualmente e recebe vantagens apropriadas.'
},

'🐍': {
    title: 'Envenenado',
    desc: 'Sofre 1d6 de dano por turno e –2 em testes físicos. Pode fazer um teste de resistência ao fim de cada turno para encerrar o efeito.												'
},

'🧎': {
    title: 'Caí­do',
    desc: 'Sofre desvantagem em ataques corpo a corpo, ataques contra ele têm vantagem, e levantar-se consome uma ação, pode esquivar ou bloquear.'
},

'😮': {
    title: 'Exausto',
    desc: 'A criatura sofre penalidades física progressivas.'
},

'🔥': {
    title: 'Em Chamas',
    desc: 'Sofre 1d6 de dano por turno até apagar o fogo (ação completa ou teste apropriado). Testes físicos sofrem –2 enquanto estiver em chamas.'
},

'💫': {
    title: 'Atordoado',
    desc: 'O personagem perde a próxima ação e não pode realizar defesa ou esquiva até o fim do próximo turno.'
},

'🩸': {
    title: 'Sangrando',
    desc: 'Sofre 1d6 de dano por turno até receber primeiros socorros ou ser curado. O efeito acumula se reaplicado.'
},

'🧊': {
    title: 'Congelado',
    desc: 'Movimento reduzido pela metade e desvantagem em ações físicas. Se falhar em um teste de resistência, fica Atordoado por 1 turno.'
},

'⚖️': {
    title: 'Desequilibrado',
    desc: 'Sofre –2 em ataques e defesas e não pode realizar reações até o próximo turno.'
}
};

let conditionPressTimer = null;

function startConditionPress(icon) {

conditionPressTimer = setTimeout(() => {

    openConditionInfo(icon);

}, 600);
}

function cancelConditionPress() {

clearTimeout(conditionPressTimer);
}

function openConditionInfo(icon) {

const data = conditionDescriptions[icon];

if (!data) return;

document.getElementById('conditionInfoIcon').innerText = icon;

        function sortCombatants() {
            combatants.sort((a, b) => {
                const aEliminated = (a.type === 'monster' && a.hpCurrent <= 0) || (a.type === 'player' && a.deathSaves?.failures >= 3);
                const bEliminated = (b.type === 'monster' && b.hpCurrent <= 0) || (b.type === 'player' && b.deathSaves?.failures >= 3);

                if (aEliminated && !bEliminated) return 1;
                if (!aEliminated && bEliminated) return -1;

                if (b.initiative !== a.initiative) return b.initiative - a.initiative;
                if (a.type === 'player' && b.type === 'monster') return -1;
                if (a.type === 'monster' && b.type === 'player') return 1;
                return a.id - b.id; 
            });
        }

function applyCalculatedDamage(typeMultiplier) {

const target = combatants.find(c => c.id === selectedId);

if (!target) return;

let armorValue = 0;

// =========================================
// ARMADURA DA PARTE DO CORPO
// =========================================

switch (pendingDamageBodyPart) {

    case 'head':
        armorValue = target.armor?.head || 0;
        break;

    case 'torso':
        armorValue = target.armor?.torso || 0;
        break;

    case 'arm':
        armorValue = target.armor?.arm || 0;
        break;

    case 'leg':
        armorValue = target.armor?.leg || 0;
        break;
}

// =========================================
// REDUZ ARMADURA PRIMEIRO
// =========================================

let finalDamage = pendingDamageBase - armorValue;

if (finalDamage < 0)
    finalDamage = 0;

    if (finalDamage === 0) {

    closeDamageModals();

    showToast('🛡️ A armadura absorveu todo o dano!');

    return;
    }

// =========================================
// MULTIPLICADOR DA PARTE DO CORPO
// =========================================

let bodyMultiplier = 1;

switch (pendingDamageBodyPart) {

    case 'head':
        bodyMultiplier = 3;
        break;

    case 'torso':
        bodyMultiplier = 1;
        break;

    case 'arm':
        bodyMultiplier = 0.5;
        break;

    case 'leg':
        bodyMultiplier = 0.5;
        break;
}

finalDamage *= bodyMultiplier;

// =========================================
// MULTIPLICADOR DO TIPO DE DANO
// =========================================

finalDamage *= typeMultiplier;

// =========================================
// ARREDONDAMENTO
// =========================================

finalDamage = Math.floor(finalDamage);

closeDamageModals();

applyDirectDamage(finalDamage);
}

        function applyHP(isHealing) {   
            if (!selectedId) { showToast('âš ï¸� Selecione um alvo!'); return; }
            const value = parseInt(currentInput) || 0;
            
            const index = combatants.findIndex(c => c.id === selectedId);
            if (index !== -1) {
                const c = combatants[index];
                const oldHP = c.hpCurrent;
                const oldFailures = c.deathSaves?.failures || 0;
                let triggerConcentration = false;
                
                if (!c.deathSaves) c.deathSaves = { success: 0, failures: 0 };

                if (isHealing) {
                    if (c.hpCurrent <= 0 && value === 0) {
                        if (oldFailures < 3) {
                            c.deathSaves.success += 1;
                            if (c.deathSaves.success >= 3) {
                                c.deathSaves = { success: 0, failures: 0 };
                                c.stabilized = true;
                                showToast('ðŸ›¡ï¸� Estabilizado!');
                            }
                        }
                    } else if (value > 0) {
                        c.hpCurrent = Math.min(c.hpMax, c.hpCurrent + value);
                        c.deathSaves = { success: 0, failures: 0 };
                        c.stabilized = false;
                    } else {
                        return; // Zero e HP normal ignora
                    }
                } else {
                    if (c.hpCurrent <= 0 && value === 0) {
                        if (oldFailures < 3) {
                            c.deathSaves.failures = Math.min(3, c.deathSaves.failures + 1);
                            c.stabilized = false;
                            if (c.deathSaves.failures >= 3) showToast('â˜ ï¸� Morto!');
                        }
                    } else if (value > 0) {
                        c.hpCurrent = Math.max(0, c.hpCurrent - value);
                        c.stabilized = false;
                        if (c.hpCurrent <= 0 && oldHP > 0) {
                            c.statusBrain = false;
                            c.deathSaves = { success: 0, failures: 0 };
                        } else if (c.hpCurrent <= 0 && oldHP <= 0) {
                            if (oldFailures < 3) {
                                c.deathSaves.failures = Math.min(3, c.deathSaves.failures + 1); // Dano com 0 HP soma falha
                                if (c.deathSaves.failures >= 3) showToast('â˜ ï¸� Morto!');
                            }
                        } else if (c.statusBrain && oldHP > 0) {
                            triggerConcentration = true;
                        }
                    } else {
                        return; // Zero e HP normal ignora
                    }
                }
                
                const newFailures = c.deathSaves.failures;
                savePlayersToStorage();
                
                const monsterDiedOrRevived = c.type === 'monster' && ((oldHP > 0 && c.hpCurrent <= 0) || (oldHP <= 0 && c.hpCurrent > 0));
                const playerDiedOrRevived = c.type === 'player' && ((oldFailures < 3 && newFailures >= 3) || (oldFailures >= 3 && newFailures < 3));

                if (monsterDiedOrRevived || playerDiedOrRevived) {
                    sortCombatants(); 
                    renderList(false);
                } else {
                    updateCardTargeted(c); 
                }
                
                clearDisplay();

                if (triggerConcentration) {
                    askConcentration(c.id);
                }
            }
        }

        function rollMonsterInitiatives() {
            let changed = false;
            combatants.forEach(c => {
                if (c.type === 'monster') {
                    c.initiative = Math.floor(Math.random() * 20) + 1;
                    changed = true;
                }
            });
            
            if (changed) {
                sortCombatants();
                renderList(true);
                clearDisplay();
            }
        }

        function applyInitiative() {
            if (didInitLongPress) {
                didInitLongPress = false;
                return;
            }

            if (!selectedId) { showToast('âš ï¸� Selecione um alvo!'); return; }
            const value = parseInt(currentInput);
            const index = combatants.findIndex(c => c.id === selectedId);
            if (index !== -1) {
                combatants[index].initiative = value;
                
                savePlayersToStorage();
                
                sortCombatants();
                renderList(true);
                clearDisplay();
            }
        }

        function savePlayersToStorage() {

        localStorage.setItem(
            'dnd_players',
            JSON.stringify(combatants)
        );
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('js/sw.js')
                    .then(() => console.log('Service Worker Registado!'))
                    .catch((err) => console.log('Erro no registo do Service Worker:', err));
            });
        }

        document.addEventListener('gesturestart', function (e) {
    e.preventDefault();
});

// Bloqueia pinch zoom
// Bloqueia apenas pinch zoom
document.addEventListener('touchmove', function (event) {

if (event.touches.length > 1) {

    event.preventDefault();
}

}, { passive: false });

// Bloqueia multitouch
document.addEventListener('touchstart', function (event) {

if (event.touches.length > 1) {
    event.preventDefault();
}

}, { passive: false });

// Bloqueia double tap zoom
let lastTouchEnd = 0;

document.addEventListener('touchend', function (event) {

const now = Date.now();

if (now - lastTouchEnd <= 300) {
    event.preventDefault();
}

lastTouchEnd = now;

}, { passive: false });

// Safari iOS
document.addEventListener('gesturestart', function (e) {
e.preventDefault();
});

document.addEventListener('gesturechange', function (e) {
e.preventDefault();
});

document.addEventListener('gestureend', function (e) {
e.preventDefault();
});

// Bloqueia dblclick desktop/mobile

e.preventDefault();
}, { passive: false });
