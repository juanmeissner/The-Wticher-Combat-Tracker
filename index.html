    <script>


        let pressTimer;
        let startY = 0; // Para ignorar scrolls na delegação
        let deleteVisibleId = null;
        let editingId = null; 
        let showEliminated = true; // Controle da divisória
        let concentrationTargetId = null;
        // =========================================
        // SISTEMA DE DANO LOCALIZADO
        // =========================================

        let pendingDamageBodyPart = null;
        let pendingDamageBase = 0;
        let initPressTimer;
        let didInitLongPress = false;

        let endCombatPressTimer;
        let didEndCombatLongPress = false;

        
         // INICIALIZAÇÃO E DELEGAÇÃO DE EVENTOS
        window.onload = () => {

            monsterCounter =
            parseInt(localStorage.getItem('dnd_monsterCounter')) || 1;

            playerCounter =
            parseInt(localStorage.getItem('dnd_playerCounter')) || 1;

            loadInventory();

            renderInventory();
            const savedPlayers = localStorage.getItem('dnd_players');
            if (savedPlayers) {
                combatants = JSON.parse(savedPlayers);
                let pCount = 0;
                let lastP = null;
                combatants.forEach(c => {
                    if (c.type === 'player') {
                        pCount++;
                        lastP = c;
                    }
                    if (!c.conditions) c.conditions = [];
                    if (!c.deathSaves) c.deathSaves = { success: 0, failures: 0 };
                    if (c.stabilized === undefined) c.stabilized = false;
                    // Migrar dados antigos
                    if (c.statusSpiral) {
                        if (!c.conditions.includes('🌀')) c.conditions.push('🌀');
                        delete c.statusSpiral;
                    }
                });
                
                if (lastP) 
                lastPlayerData = {
                hp: lastP.hpMax,
                st: lastP.stMax,
                ca: lastP.ca,
                atk: lastP.atkInfo
            };
                if (combatants.length > 0) activeTurnId = combatants[0].id;
                renderList();
            }

            // Delegação de Eventos na Main List
            const list = document.getElementById('combatList');
            list.addEventListener('mousedown', handleCardPressStart);
            list.addEventListener('touchstart', (e) => {
                startY = e.touches[0].clientY;
                handleCardPressStart(e);
            }, {passive: true});
            list.addEventListener('touchmove', (e) => {
                if (Math.abs(e.touches[0].clientY - startY) > 10) handleCardPressEnd();
            }, {passive: true});
            list.addEventListener('mouseup', handleCardPressEnd);
            list.addEventListener('mouseleave', handleCardPressEnd);
            list.addEventListener('touchend', handleCardPressEnd);
            list.addEventListener('click', handleListClick);

            // FECHAR MENU AO CLICAR FORA
            document.addEventListener('click', (e) => {

                // Se não existe menu aberto
                if (!deleteVisibleId) return;

                // Se clicou dentro do card
                if (e.target.closest('.combat-card')) return;

                // Fecha o menu
                deleteVisibleId = null;

                renderList();

            });
        };



        document.addEventListener('gesturestart', function (e) {
        e.preventDefault();
    });


// =========================================
// BLOQUEIO TOTAL DE ZOOM MOBILE
// =========================================

// Bloqueia pinch zoom
// Bloqueia apenas pinch zoom
document.addEventListener('touchmove', function (event) {

if (event.touches.length > 1) {

    event.preventDefault();
}

}, { passive: false });

// Bloqueia multitouch
document.addEventListener('touchstart', function (event) {

if (event.touches.length > 1) {
    event.preventDefault();
}

}, { passive: false });

// Bloqueia double tap zoom
let lastTouchEnd = 0;

document.addEventListener('touchend', function (event) {

const now = Date.now();

if (now - lastTouchEnd <= 300) {
    event.preventDefault();
}

lastTouchEnd = now;

}, { passive: false });

// Safari iOS
document.addEventListener('gesturestart', function (e) {
e.preventDefault();
});

document.addEventListener('gesturechange', function (e) {
e.preventDefault();
});

document.addEventListener('gestureend', function (e) {
e.preventDefault();
});

// Bloqueia dblclick desktop/mobile
document.addEventListener('dblclick', function (e) {
e.preventDefault();
}, { passive: false });

    </script>

<div id="monsterChoiceModal" class="modal">

    <div class="bg-slate-900 p-6 rounded-2xl w-full max-w-sm border border-slate-700">

        <h2 class="text-xl font-bold mb-6 text-white text-center">
            Adicionar Monstro
        </h2>

        <div class="flex flex-col gap-3">

            <button
                onclick="openModal('monster'); closeMonsterChoiceModal();"

                class="p-4 rounded-xl bg-red-700 hover:bg-red-600 font-bold transition-all">

                ➕ Criar Novo
            </button>

            <button
                onclick="openPresetMonsterModal()"

                class="p-4 rounded-xl bg-slate-700 hover:bg-slate-600 font-bold transition-all">

                📚 Usar Predefinido
            </button>

        </div>

        <button
            onclick="closeMonsterChoiceModal()"

            class="mt-4 w-full p-3 rounded-xl bg-slate-800 hover:bg-slate-700 transition-all">

            Cancelar
        </button>

    </div>

</div>

<div id="presetMonsterModal" class="modal">

    <div class="bg-slate-900
                p-6
                rounded-2xl
                w-full
                max-w-7xl
                h-[95vh]
                border
                border-slate-700
                flex
                flex-col">

        <h2 class="text-xl font-bold mb-4 text-white text-center">
            Bestiário
        </h2>

        <!-- BUSCADOR -->
        <div class="mb-4">

            <input
                type="text"
                id="monsterSearchInput"
                placeholder="Buscar monstro..."
                
                oninput="filterPresetMonsters()"

                class="w-full
                       p-3
                       rounded-xl
                       bg-slate-800
                       border
                       border-slate-700
                       text-white
                       placeholder-slate-400
                       outline-none
                       focus:border-red-500
                       transition-all"
            >

        </div>

        <!-- LISTA -->
        <div
            id="presetMonsterList"

            class="flex-1
                   flex
                   flex-col
                   gap-3
                   overflow-y-auto">

        </div>

        <button
            onclick="closePresetMonsterModal()"

            class="mt-4
                   w-full
                   p-3
                   rounded-xl
                   bg-slate-800
                   hover:bg-slate-700
                   transition-all">

            Fechar
        </button>

    </div>

</div>

<div id="monsterDetailsModal" class="modal">

    <div class="bg-slate-900
                p-6
                rounded-2xl
                w-full
                max-w-[95vw]
                h-[95vh]
                border
                border-slate-700
                relative
                flex
                flex-col">

        <!-- BOTÃO X -->

        <button

            onclick="closeMonsterDetailsModal()"

            class="absolute
                   top-3
                   right-3
                   w-10
                   h-10
                   rounded-full
                   bg-slate-800
                   hover:bg-slate-700
                   text-white
                   text-xl
                   flex
                   items-center
                   justify-center
                   z-50">

            ✕

        </button>

        <!-- CONTEÚDO -->

        <div

            id="monsterDetailsContent"

            class="flex-1
                   overflow-y-auto
                   pr-2">

        </div>

    </div>

</div>



<!-- ========================================= -->
<!-- MODAL DESCRIÇÃO DE STATUS -->
<!-- ========================================= -->

<div id="conditionInfoModal" class="modal" style="z-index: 90;">

    <div class="bg-slate-900 p-6 rounded-2xl w-full max-w-md border border-slate-700">

        <div class="flex items-center gap-3 mb-4">

            <div id="conditionInfoIcon" class="text-4xl">
                🔥
            </div>

            <div>

                <h2 id="conditionInfoTitle"
                    class="text-xl font-bold text-white">
                    Fogo
                </h2>

            </div>

        </div>

        <div id="conditionInfoDescription"
            class="text-slate-300 leading-relaxed text-sm">

            Descrição...
        </div>

        <button onclick="closeConditionInfoModal()"
            class="mt-6 w-full p-3 rounded-xl bg-slate-700 hover:bg-slate-600 transition-all font-bold">

            Fechar

        </button>

    </div>

</div>

<!-- =====================================
ABILITIES MODAL
===================================== -->

<div id="abilitiesModal"
     class="hidden
            fixed
            inset-0
            z-50
            bg-black/70
            flex
            items-center
            justify-center
            p-4">

    <div class="bg-slate-900
                w-full
                max-w-md
                rounded-2xl
                flex
                flex-col
                max-h-[90vh]">

        <div class="flex
                    justify-between
                    items-center
                    p-4
                    border-b
                    border-slate-700">

            <h2 class="text-white text-xl font-bold">

                Habilidades

            </h2>

            <button
                onclick="closeAbilitiesModal()"

                class="bg-red-700
                       text-white
                       px-4
                       py-2
                       rounded-xl">

                Fechar

            </button>

        </div>

        <div class="mb-4">

            <input
                id="abilitiesSearchInput"
                type="text"
                placeholder="Buscar habilidade..."
                oninput="renderAbilitiesModal()"
        
                class="w-full
                       bg-slate-800
                       border
                       border-slate-700
                       rounded-xl
                       px-4
                       py-3
                       text-white
                       outline-none
                       focus:border-cyan-500">
        
        </div>

        <div id="abilitiesModalList"

             class="flex-1
                    overflow-y-auto
                    p-4
                    pb-10
                    space-y-3">

        </div>

    </div>

</div>

<!-- =====================================
ABILITY DETAILS MODAL
===================================== -->

<div id="abilityDetailsModal"
     class="hidden
            fixed
            inset-0
            z-50
            bg-black/70
            flex
            items-center
            justify-center
            p-4">

            <div class="bg-slate-900
            w-full
            max-w-md
            max-h-[90vh]
            rounded-2xl
            p-5
            text-white
            overflow-y-auto">

        <div id="abilityDetailsContent">
        </div>

        <div class="flex gap-3 mt-5">

            <button
                id="addAbilityBtn"

                class="flex-1
                       bg-blue-700
                       py-3
                       rounded-xl">

                Adicionar

            </button>

            <button
            onclick="closeAbilityDetailsModal()"
            class="w-full
                   mt-3
                   py-3
                   rounded-xl
                   font-bold
                   text-white
                   bg-slate-700
                   hover:bg-slate-600">
        
            Fechar
        
        </button>

        </div>

    </div>

</div>

<!-- ================================= -->
<!-- MODAL MAGIA EXPANDIDA -->
<!-- ================================= -->

<div id="expandedMagicModal"
     class="hidden fixed inset-0 z-50
            bg-black/70
            flex items-center justify-center">

    <div class="bg-slate-900
                p-6
                rounded-2xl
                w-full
                max-w-sm
                border border-slate-700">

        <h2 class="text-2xl font-bold mb-6 text-center">

            Magia Expandida

        </h2>

        <div class="grid grid-cols-3 gap-3">

            <button onclick="setExpandedMagic(0)"
                class="bg-purple-700 hover:bg-purple-600 rounded-xl py-3 font-bold">
                0
            </button>

            <button onclick="setExpandedMagic(1)"
                class="bg-purple-700 hover:bg-purple-600 rounded-xl py-3 font-bold">
                1
            </button>

            <button onclick="setExpandedMagic(2)"
                class="bg-purple-700 hover:bg-purple-600 rounded-xl py-3 font-bold">
                2
            </button>

            <button onclick="setExpandedMagic(3)"
                class="bg-purple-700 hover:bg-purple-600 rounded-xl py-3 font-bold">
                3
            </button>

            <button onclick="setExpandedMagic(4)"
                class="bg-purple-700 hover:bg-purple-600 rounded-xl py-3 font-bold">
                4
            </button>


        </div>

        <button
            onclick="closeExpandedMagicModal()"
            class="w-full
                   mt-6
                   bg-red-700
                   hover:bg-red-600
                   rounded-xl
                   py-3
                   font-bold">

            Fechar

        </button>

    </div>

</div>



<div id="toastContainer"></div>

</body>
</html>
